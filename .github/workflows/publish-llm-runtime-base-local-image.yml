name: Publish llm-runtime base-local image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag (e.g. cpu-arm64)
        required: false
        default: cpu-arm64
      platforms:
        description: Build platforms
        required: false
        default: linux/arm64
      base_image:
        description: Base llm-runtime-cpu image
        required: false
        default: docker.io/assistos/llm-runtime-cpu:cpu-arm64-smoke
      model_repo:
        description: HuggingFace GGUF repo
        required: false
        default: Qwen/Qwen2.5-1.5B-Instruct-GGUF
      model_file:
        description: GGUF filename
        required: false
        default: qwen2.5-1.5b-instruct-q4_k_m.gguf

env:
  IMAGE_NAME: assistos/llm-runtime-base-local

jobs:
  publish:
    name: Build and push Docker Hub image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,prefix=${{ inputs.image_tag }}-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: images/llm-runtime-base-local
          platforms: ${{ inputs.platforms }}
          push: true
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}
            MODEL_REPO=${{ inputs.model_repo }}
            MODEL_FILE=${{ inputs.model_file }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
