name: Publish web-publishing-agent image

on:
  workflow_dispatch:
    inputs:
      cloudflared_image:
        description: 'Cloudflare cloudflared tag plus multiarch sha256 manifest digest'
        required: false
        default: 'docker.io/cloudflare/cloudflared:2026.7.1@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe'
        type: string
      base_image:
        description: 'Node-capable Ploinky tag plus multiarch sha256 manifest digest'
        required: false
        default: 'docker.io/assistos/ploinky-node:24-bookworm-tools@sha256:95ec6e79245cf6a193b3cdd95b0f7a329edf938f1bdf29e7f4fe361df784cdea'
        type: string
      image_tag:
        description: 'Docker Hub tag to publish'
        required: false
        default: 'node24-nginx-cloudflared'
        type: string
  push:
    branches:
      - main
    paths:
      - 'images/web-publishing-agent/**'
      - '.github/workflows/publish-web-publishing-agent-image.yml'

permissions:
  contents: read

concurrency:
  group: publish-web-publishing-agent-image
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/web-publishing-agent
  DEFAULT_CLOUDFLARED_IMAGE: docker.io/cloudflare/cloudflared:2026.7.1@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe
  DEFAULT_BASE_IMAGE: docker.io/assistos/ploinky-node:24-bookworm-tools@sha256:95ec6e79245cf6a193b3cdd95b0f7a329edf938f1bdf29e7f4fe361df784cdea
  DEFAULT_IMAGE_TAG: node24-nginx-cloudflared

jobs:
  publish:
    name: Build and push Docker Hub image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout image definitions
        uses: actions/checkout@v4

      - name: Resolve image inputs
        id: image
        env:
          INPUT_CLOUDFLARED_IMAGE: ${{ github.event.inputs.cloudflared_image }}
          INPUT_BASE_IMAGE: ${{ github.event.inputs.base_image }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          cloudflared_image="${INPUT_CLOUDFLARED_IMAGE:-}"
          base_image="${INPUT_BASE_IMAGE:-}"
          image_tag="${INPUT_IMAGE_TAG:-}"
          if [ -z "$cloudflared_image" ]; then
            cloudflared_image="$DEFAULT_CLOUDFLARED_IMAGE"
          fi
          if [ -z "$base_image" ]; then
            base_image="$DEFAULT_BASE_IMAGE"
          fi
          if [ -z "$image_tag" ]; then
            image_tag="$DEFAULT_IMAGE_TAG"
          fi

          digest_ref_pattern='^[A-Za-z0-9._-]+(:[0-9]+)?/[A-Za-z0-9._/-]+:[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}@sha256:[0-9a-f]{64}$'
          tag_pattern='^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'
          if [[ "$cloudflared_image" == *$'\n'* || "$cloudflared_image" == *$'\r'* || ! "$cloudflared_image" =~ $digest_ref_pattern ]]; then
            echo "cloudflared_image must be an immutable tag@sha256 manifest digest reference." >&2
            exit 1
          fi
          if [[ "$base_image" == *$'\n'* || "$base_image" == *$'\r'* || ! "$base_image" =~ $digest_ref_pattern ]]; then
            echo "base_image must be an immutable tag@sha256 manifest digest reference." >&2
            exit 1
          fi
          if [[ "$image_tag" == *$'\n'* || "$image_tag" == *$'\r'* || ! "$image_tag" =~ $tag_pattern ]]; then
            echo "Invalid image_tag input." >&2
            exit 1
          fi

          printf '%s\n' "cloudflared_image=$cloudflared_image" >> "$GITHUB_OUTPUT"
          printf '%s\n' "base_image=$base_image" >> "$GITHUB_OUTPUT"
          printf '%s\n' "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Validate multiarchitecture source manifests
        env:
          CLOUDFLARED_IMAGE: ${{ steps.image.outputs.cloudflared_image }}
          BASE_IMAGE: ${{ steps.image.outputs.base_image }}
        run: |
          set -euo pipefail
          for source_ref in "$CLOUDFLARED_IMAGE" "$BASE_IMAGE"; do
            manifest="$(docker manifest inspect "$source_ref")"
            jq -e '
              (.manifests | type == "array")
              and any(.manifests[]; .platform.os == "linux" and .platform.architecture == "amd64")
              and any(.manifests[]; .platform.os == "linux" and .platform.architecture == "arm64")
            ' <<< "$manifest" >/dev/null || {
              echo "Source image must resolve to a linux/amd64 and linux/arm64 manifest index: $source_ref" >&2
              exit 1
            }
          done

      - name: Smoke build local architecture
        run: |
          set -euo pipefail
          docker build \
            --build-arg CLOUDFLARED_IMAGE='${{ steps.image.outputs.cloudflared_image }}' \
            --build-arg BASE_IMAGE='${{ steps.image.outputs.base_image }}' \
            -t "$IMAGE_NAME:smoke" \
            images/web-publishing-agent
          docker run --rm "$IMAGE_NAME:smoke" sh -c 'node --version && nginx -v && cloudflared --version'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image.outputs.image_tag }}
            type=sha,prefix=${{ steps.image.outputs.image_tag }}-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: images/web-publishing-agent
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            CLOUDFLARED_IMAGE=${{ steps.image.outputs.cloudflared_image }}
            BASE_IMAGE=${{ steps.image.outputs.base_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Report immutable image reference
        id: report
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ ! "$BUILD_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Build output digest is missing or malformed." >&2
            exit 1
          fi
          immutable_ref="docker.io/${IMAGE_NAME}@${BUILD_DIGEST}"
          echo "Published immutable image: $immutable_ref"
          printf 'Published immutable image: `%s`\n' "$immutable_ref" >> "$GITHUB_STEP_SUMMARY"
