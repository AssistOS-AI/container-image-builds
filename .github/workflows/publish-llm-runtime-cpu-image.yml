name: Publish LLM Runtime CPU image

on:
  workflow_dispatch:
    inputs:
      node_base:
        description: 'Node base image to build from'
        required: false
        default: 'node:24-bookworm-slim'
        type: string
      llama_cpp_ref:
        description: 'llama.cpp tag, branch, or commit to build'
        required: false
        default: 'b6412'
        type: string
      image_tag:
        description: 'Docker Hub tag to publish'
        required: false
        default: 'cpu-arm64-smoke'
        type: string
      platforms:
        description: 'Comma-separated OCI platforms to publish'
        required: false
        default: 'linux/arm64'
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-llm-runtime-cpu-image
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/llm-runtime-cpu
  DEFAULT_NODE_BASE: node:24-bookworm-slim
  DEFAULT_LLAMA_CPP_REF: b6412
  DEFAULT_IMAGE_TAG: cpu-arm64-smoke
  DEFAULT_PLATFORMS: linux/arm64

jobs:
  publish:
    name: Build and push Docker Hub image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image inputs
        id: image
        run: |
          set -euo pipefail
          node_base="${{ github.event.inputs.node_base }}"
          llama_cpp_ref="${{ github.event.inputs.llama_cpp_ref }}"
          image_tag="${{ github.event.inputs.image_tag }}"
          platforms="${{ github.event.inputs.platforms }}"
          if [ -z "$node_base" ]; then
            node_base="$DEFAULT_NODE_BASE"
          fi
          if [ -z "$llama_cpp_ref" ]; then
            llama_cpp_ref="$DEFAULT_LLAMA_CPP_REF"
          fi
          if [ -z "$image_tag" ]; then
            image_tag="$DEFAULT_IMAGE_TAG"
          fi
          if [ -z "$platforms" ]; then
            platforms="$DEFAULT_PLATFORMS"
          fi
          echo "node_base=$node_base" >> "$GITHUB_OUTPUT"
          echo "llama_cpp_ref=$llama_cpp_ref" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "platforms=$platforms" >> "$GITHUB_OUTPUT"

      - name: Smoke build local architecture
        run: |
          set -euo pipefail
          docker build \
            --build-arg NODE_BASE='${{ steps.image.outputs.node_base }}' \
            --build-arg LLAMA_CPP_REF='${{ steps.image.outputs.llama_cpp_ref }}' \
            --build-arg LLAMA_BUILD_JOBS=1 \
            -t "$IMAGE_NAME:smoke" \
            images/llm-runtime-cpu
          docker run --rm "$IMAGE_NAME:smoke" sh -lc 'node --version && npm --version && hf --help >/dev/null && llama-server --version && test -d /models/hf-cache && test -d /models/artifacts && test -d /models/derived && test -d /runtime'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image.outputs.image_tag }}
            type=sha,prefix=${{ steps.image.outputs.image_tag }}-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: images/llm-runtime-cpu
          platforms: ${{ steps.image.outputs.platforms }}
          push: true
          build-args: |
            NODE_BASE=${{ steps.image.outputs.node_base }}
            LLAMA_CPP_REF=${{ steps.image.outputs.llama_cpp_ref }}
            LLAMA_BUILD_JOBS=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
