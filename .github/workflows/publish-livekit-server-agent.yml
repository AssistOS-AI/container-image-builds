name: Publish liveKitServerAgent image

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'AssistOS-AI/webmeetInfra ref to build from'
        required: false
        default: 'main'
        type: string
      image_tag:
        description: 'Docker Hub tag to publish for liveKitServerAgent'
        required: false
        default: 'webmeet-infra'
        type: string

permissions:
  contents: read

concurrency:
  group: publish-livekit-server-agent-image
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/livekit-server-agent
  IMAGE_TAG: ${{ inputs.image_tag || 'webmeet-infra' }}

jobs:
  publish:
    name: Build and push Docker Hub image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout webmeetInfra source
        uses: actions/checkout@v4
        with:
          repository: AssistOS-AI/webmeetInfra
          ref: ${{ inputs.source_ref || 'main' }}
          path: sources/webmeetInfra
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Resolve source revision
        id: source
        run: echo "sha=$(git -C sources/webmeetInfra rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=${{ env.IMAGE_TAG }}-${{ steps.source.outputs.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sources/webmeetInfra/liveKitServerAgent
          file: ./images/livekit-server-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
