name: Publish OnlyOfficeAgent image

on:
  workflow_dispatch:
    inputs:
      expected_digest:
        description: 'Pre-approved sha256 digest of the exact multi-architecture OCI index'
        required: true
        type: string
      image_tag:
        description: 'Docker Hub tag to publish after digest verification'
        required: false
        default: '9.3.1'
        type: string

permissions:
  contents: read

concurrency:
  group: publish-onlyoffice-agent-image
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/onlyoffice-agent
  IMAGE_TAG: ${{ inputs.image_tag || '9.3.1' }}
  EXPECTED_DIGEST: ${{ inputs.expected_digest }}

jobs:
  publish:
    name: Verify exact OCI index, then publish
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout image definitions
        uses: actions/checkout@v4

      - name: Validate publication inputs
        run: |
          set -euo pipefail
          if [[ ! "$EXPECTED_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo 'expected_digest must be an explicit lowercase sha256 OCI-index digest; placeholders are forbidden' >&2
            exit 1
          fi
          if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo 'image_tag is malformed' >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Smoke build local architecture
        run: |
          set -euo pipefail
          docker build -t "$IMAGE_NAME:smoke" images/onlyoffice-agent
          docker run --rm --entrypoint /bin/bash "$IMAGE_NAME:smoke" -lc '
            set -eu
            node --version
            npm --version
            git --version
            python3 --version
            make --version
            test -x /app/ds/run-document-server.sh
          '

      - name: Build sealed multi-architecture OCI archive
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --provenance=false \
            --output type=oci,dest=/tmp/onlyoffice-agent.oci.tar \
            images/onlyoffice-agent

      - name: Verify archive digest and platform set before registry mutation
        id: archive
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import re
          import tarfile

          archive = pathlib.Path('/tmp/onlyoffice-agent.oci.tar')
          expected = os.environ['EXPECTED_DIGEST']
          with tarfile.open(archive, 'r') as tar:
              root = json.load(tar.extractfile('index.json'))
              descriptors = root.get('manifests')
              if not isinstance(descriptors, list) or len(descriptors) != 1:
                  raise SystemExit('OCI archive must contain exactly one top-level image index')
              descriptor = descriptors[0]
              digest = descriptor.get('digest', '')
              if not re.fullmatch(r'sha256:[0-9a-f]{64}', digest):
                  raise SystemExit('OCI archive descriptor digest is malformed')
              blob_name = f"blobs/sha256/{digest.removeprefix('sha256:')}"
              blob = tar.extractfile(blob_name).read()
              actual = 'sha256:' + hashlib.sha256(blob).hexdigest()
              if actual != digest:
                  raise SystemExit('OCI archive descriptor does not match its exact bytes')
              image_index = json.loads(blob)
              if image_index.get('mediaType') != 'application/vnd.oci.image.index.v1+json':
                  raise SystemExit('sealed artifact is not an OCI image index')
              platforms = {
                  (item.get('platform', {}).get('os'), item.get('platform', {}).get('architecture'))
                  for item in image_index.get('manifests', [])
              }
              required = {('linux', 'amd64'), ('linux', 'arm64')}
              if platforms != required:
                  raise SystemExit(f'OCI platform set must equal {sorted(required)}, got {sorted(platforms)}')
              if actual != expected:
                  raise SystemExit(f'computed OCI index {actual} does not equal approved expected_digest')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'digest={actual}\n')
          PY

      - name: Install archive publisher
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends skopeo

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish the already-verified archive
        run: |
          set -euo pipefail
          destination="docker://docker.io/${IMAGE_NAME}:${IMAGE_TAG}"
          skopeo copy --all "oci-archive:/tmp/onlyoffice-agent.oci.tar" "$destination"
          remote_digest="$(skopeo inspect --raw "$destination" | sha256sum | awk '{print "sha256:" $1}')"
          if [ "$remote_digest" != "$EXPECTED_DIGEST" ]; then
            echo "registry digest mismatch after copy: expected $EXPECTED_DIGEST, got $remote_digest" >&2
            exit 1
          fi
          printf 'Published immutable image: `docker.io/%s@%s`\n' \
            "$IMAGE_NAME" "$remote_digest" >> "$GITHUB_STEP_SUMMARY"
