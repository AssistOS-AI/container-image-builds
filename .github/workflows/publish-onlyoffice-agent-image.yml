name: Publish OnlyOfficeAgent image

on:
  workflow_dispatch:
    inputs:
      onlyoffice_version:
        description: 'OnlyOffice Document Server base tag'
        required: false
        default: '9.3.1'
        type: string
      node_runtime_image:
        description: 'Node image to copy runtime from'
        required: false
        default: 'node:24-bookworm-slim'
        type: string
      image_tag:
        description: 'Docker Hub tag to publish'
        required: false
        default: '9.3.1'
        type: string
  push:
    branches:
      - main
    paths:
      - 'images/onlyoffice-agent/**'
      - '.github/workflows/publish-onlyoffice-agent-image.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-onlyoffice-agent-image
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/onlyoffice-agent
  DEFAULT_ONLYOFFICE_VERSION: 9.3.1
  DEFAULT_NODE_RUNTIME_IMAGE: node:24-bookworm-slim
  DEFAULT_IMAGE_TAG: 9.3.1

jobs:
  publish:
    name: Build and push Docker Hub image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout image definitions
        uses: actions/checkout@v4

      - name: Resolve image inputs
        id: image
        run: |
          set -euo pipefail
          onlyoffice_version="${{ github.event.inputs.onlyoffice_version }}"
          node_runtime_image="${{ github.event.inputs.node_runtime_image }}"
          image_tag="${{ github.event.inputs.image_tag }}"
          if [ -z "$onlyoffice_version" ]; then
            onlyoffice_version="$DEFAULT_ONLYOFFICE_VERSION"
          fi
          if [ -z "$node_runtime_image" ]; then
            node_runtime_image="$DEFAULT_NODE_RUNTIME_IMAGE"
          fi
          if [ -z "$image_tag" ]; then
            image_tag="$DEFAULT_IMAGE_TAG"
          fi
          echo "onlyoffice_base_image=docker.io/onlyoffice/documentserver:${onlyoffice_version}" >> "$GITHUB_OUTPUT"
          echo "node_runtime_image=$node_runtime_image" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Smoke build local architecture
        run: |
          set -euo pipefail
          docker build \
            --build-arg ONLYOFFICE_BASE_IMAGE='${{ steps.image.outputs.onlyoffice_base_image }}' \
            --build-arg NODE_RUNTIME_IMAGE='${{ steps.image.outputs.node_runtime_image }}' \
            -t "$IMAGE_NAME:smoke" \
            images/onlyoffice-agent
          docker run --rm --entrypoint node "$IMAGE_NAME:smoke" --version
          docker run --rm --entrypoint npm "$IMAGE_NAME:smoke" --version
          docker run --rm --entrypoint git "$IMAGE_NAME:smoke" --version
          docker run --rm --entrypoint python3 "$IMAGE_NAME:smoke" --version
          docker run --rm --entrypoint make "$IMAGE_NAME:smoke" --version
          docker run --rm --entrypoint /bin/bash "$IMAGE_NAME:smoke" -lc 'test -x /app/ds/run-document-server.sh'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image.outputs.image_tag }}
            type=sha,prefix=${{ steps.image.outputs.image_tag }}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/onlyoffice-agent
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ONLYOFFICE_BASE_IMAGE=${{ steps.image.outputs.onlyoffice_base_image }}
            NODE_RUNTIME_IMAGE=${{ steps.image.outputs.node_runtime_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
