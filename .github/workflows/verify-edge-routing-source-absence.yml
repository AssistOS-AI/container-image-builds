name: Verify edge-routing source absence

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  source-absence:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Reject retired edge-publication source
        run: node --test tests/edge-routing-source-absence.test.mjs
