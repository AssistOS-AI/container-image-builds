name: Publish ploinky-box image

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Exact 40-character AssistOS-AI/ploinky commit SHA
        required: true
        type: string
      explorer_ref:
        description: Exact 40-character AssistOS-AI/AssistOSExplorer commit SHA
        required: true
        type: string
      webmeet_infra_ref:
        description: Exact 40-character AssistOS-AI/webmeetInfra commit SHA
        required: true
        type: string
      umami_ref:
        description: Exact 40-character AssistOS-AI/UmamiAgent commit SHA
        required: true
        type: string
      achilles_cli_ref:
        description: Exact 40-character AssistOS-AI/AchillesCLI commit SHA
        required: true
        type: string
      proxies_ref:
        description: Exact 40-character AssistOS-AI/proxies commit SHA
        required: true
        type: string
      basic_ref:
        description: Exact 40-character AssistOS-AI/basic commit SHA
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-ploinky-box-image
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/ploinky-box
  IMAGE_TAG: runtime

jobs:
  resolve-source:
    name: Resolve immutable inputs
    runs-on: ubuntu-24.04
    outputs:
      source_sha: ${{ steps.inputs.outputs.source_sha }}
    steps:
      - name: Require all seven immutable source SHAs
        id: inputs
        env:
          SOURCE_SHA: ${{ inputs.source_ref }}
          EXPLORER_SHA: ${{ inputs.explorer_ref }}
          WEBMEET_INFRA_SHA: ${{ inputs.webmeet_infra_ref }}
          UMAMI_SHA: ${{ inputs.umami_ref }}
          ACHILLES_CLI_SHA: ${{ inputs.achilles_cli_ref }}
          PROXIES_SHA: ${{ inputs.proxies_ref }}
          BASIC_SHA: ${{ inputs.basic_ref }}
        run: |
          set -euo pipefail
          for sha in \
            "$SOURCE_SHA" "$EXPLORER_SHA" "$WEBMEET_INFRA_SHA" \
            "$UMAMI_SHA" "$ACHILLES_CLI_SHA" "$PROXIES_SHA" "$BASIC_SHA"; do
            [[ "$sha" =~ ^[0-9a-f]{40}$ ]]
          done
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

  build:
    name: Build and gate ${{ matrix.platform }}
    needs: resolve-source
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout image definitions
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout immutable Ploinky source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: AssistOS-AI/ploinky
          ref: ${{ needs.resolve-source.outputs.source_sha }}
          path: sources/ploinky
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Checkout exact Explorer source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: AssistOS-AI/AssistOSExplorer
          ref: ${{ inputs.explorer_ref }}
          path: sources/full-workspace/AssistOSExplorer
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Checkout exact WebMeet infrastructure source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: AssistOS-AI/webmeetInfra
          ref: ${{ inputs.webmeet_infra_ref }}
          path: sources/full-workspace/webmeetInfra
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Checkout exact Umami source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: AssistOS-AI/UmamiAgent
          ref: ${{ inputs.umami_ref }}
          path: sources/full-workspace/UmamiAgent
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Checkout exact AchillesCLI source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: AssistOS-AI/AchillesCLI
          ref: ${{ inputs.achilles_cli_ref }}
          path: sources/full-workspace/AchillesCLI
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Checkout exact proxies source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: AssistOS-AI/proxies
          ref: ${{ inputs.proxies_ref }}
          path: sources/full-workspace/proxies
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Checkout exact basic source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: AssistOS-AI/basic
          ref: ${{ inputs.basic_ref }}
          path: sources/full-workspace/basic
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Verify exact clean source graph and export the three-JSON contract
        env:
          SOURCE_SHA: ${{ needs.resolve-source.outputs.source_sha }}
          EXPLORER_SHA: ${{ inputs.explorer_ref }}
          WEBMEET_INFRA_SHA: ${{ inputs.webmeet_infra_ref }}
          UMAMI_SHA: ${{ inputs.umami_ref }}
          ACHILLES_CLI_SHA: ${{ inputs.achilles_cli_ref }}
          PROXIES_SHA: ${{ inputs.proxies_ref }}
          BASIC_SHA: ${{ inputs.basic_ref }}
        run: |
          set -euo pipefail
          test "$(git -C sources/ploinky rev-parse HEAD)" = "$SOURCE_SHA"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import fs from 'node:fs';
          import path from 'node:path';

          const repositories = {
            AssistOSExplorer: path.resolve('sources/full-workspace/AssistOSExplorer'),
            webmeetInfra: path.resolve('sources/full-workspace/webmeetInfra'),
            UmamiAgent: path.resolve('sources/full-workspace/UmamiAgent'),
            AchillesCLI: path.resolve('sources/full-workspace/AchillesCLI'),
            proxies: path.resolve('sources/full-workspace/proxies'),
            basic: path.resolve('sources/full-workspace/basic'),
            'container-image-builds': process.env.GITHUB_WORKSPACE,
          };
          const revisions = {
            AssistOSExplorer: process.env.EXPLORER_SHA,
            webmeetInfra: process.env.WEBMEET_INFRA_SHA,
            UmamiAgent: process.env.UMAMI_SHA,
            AchillesCLI: process.env.ACHILLES_CLI_SHA,
            proxies: process.env.PROXIES_SHA,
            basic: process.env.BASIC_SHA,
            'container-image-builds': process.env.GITHUB_SHA,
          };
          for (const [name, repository] of Object.entries(repositories)) {
            const real = fs.realpathSync(repository);
            if (real !== repository) throw new Error(`${name} path is not canonical`);
            const head = execFileSync('git', ['-C', real, 'rev-parse', 'HEAD'], { encoding: 'utf8' }).trim();
            const dirty = execFileSync('git', ['-C', real, 'status', '--porcelain=v1'], { encoding: 'utf8' });
            if (head !== revisions[name]) throw new Error(`${name} HEAD mismatch`);
            if (dirty !== '') throw new Error(`${name} checkout is dirty`);
          }
          const values = {
            SMOKE_GRAPH_ARGS_JSON: JSON.stringify(['start', 'AssistOSExplorer/explorer', '19090']),
            SMOKE_GRAPH_REPOSITORIES_JSON: JSON.stringify(repositories),
            SMOKE_GRAPH_REVISIONS_JSON: JSON.stringify(revisions),
          };
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            Object.entries(values).map(([key, value]) => `${key}=${value}\n`).join(''),
          );
          NODE

      - name: Run all image repository contract tests
        run: |
          set -euo pipefail
          mapfile -d '' tests < <(
            find tests -maxdepth 1 -type f \
              \( -name '*.test.js' -o -name '*.test.mjs' -o -name '*.test.cjs' \) \
              -print0 | sort -z
          )
          test "${#tests[@]}" -gt 0
          node --test "${tests[@]}"

      - name: Run contract-6 entrypoint and Box unit suites
        working-directory: sources/ploinky
        run: |
          set -euo pipefail
          mapfile -d '' tests < <(
            find tests/unit -maxdepth 1 -type f \
              \( -name 'ploinkyBox*.test.js' -o -name 'ploinkyBox*.test.mjs' -o -name 'ploinkyBox*.test.cjs' \) \
              -print0 | sort -z
          )
          test "${#tests[@]}" -gt 0
          node --test "${tests[@]}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push candidate by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./images/ploinky-box/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=docker.io/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Resolve immutable candidate and install native rootless Podman
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          [[ "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "PLOINKY_BOX_CANDIDATE_DIGEST=$DIGEST" >> "$GITHUB_ENV"
          echo "PLOINKY_BOX_CANDIDATE_REF=docker.io/${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_ENV"
          sudo apt-get update
          sudo apt-get install -y podman uidmap fuse-overlayfs
          test -e /dev/fuse
          test -e /dev/net/tun
          test "$(podman info --format '{{.Host.Security.Rootless}}')" = true
          real_podman="$(realpath "$(command -v podman)")"
          test -x "$real_podman"
          echo "PLOINKY_BOX_REAL_PODMAN=$real_podman" >> "$GITHUB_ENV"
          podman pull "docker.io/${IMAGE_NAME}@${DIGEST}"
          podman pull docker.io/library/busybox:1.36

      - name: Inspect exact contract-6 metadata and native platform
        env:
          EXPECTED_PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          podman image inspect "$PLOINKY_BOX_CANDIDATE_REF" > "$RUNNER_TEMP/ploinky-box-image.json"
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import fs from 'node:fs';
          const image = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/ploinky-box-image.json'))[0];
          const config = image.Config || {};
          const labels = config.Labels || {};
          assert.equal(labels['io.assistos.ploinky.runtime-contract'], '6');
          assert.deepEqual(config.Entrypoint, ['/usr/local/bin/ploinky-box-entrypoint']);
          assert.equal(config.Cmd ?? null, null);
          assert.equal(config.Volumes ?? null, null);
          assert.deepEqual(new Set(config.Env || []), new Set([
            'PATH=/opt/ploinky/bin:/usr/local/bin:/usr/bin',
            'USER=podman',
            'HOME=/home/podman',
            'PLOINKY_WORKSPACE_ROOT=/workspace',
            'PLOINKY_DISABLE_HOST_SANDBOX=1',
            'container=oci',
            '_CONTAINERS_USERNS_CONFIGURED=',
            'BUILDAH_ISOLATION=chroot',
          ]));
          assert.equal(`${image.Os}/${image.Architecture}`, process.env.EXPECTED_PLATFORM);
          NODE
          podman run --rm --entrypoint /bin/bash "$PLOINKY_BOX_CANDIDATE_REF" -lc '
            set -euo pipefail
            test "$(cat /etc/ploinky-box)" = 6
            test "$(stat -c %U:%G /workspace)" = podman:podman
            test "$(stat -c %U:%G /opt/ploinky/node_modules)" = podman:podman
            test "$(stat -c %U:%G /home/podman/.local/share/containers/storage)" = podman:podman
            test "$(stat -c %a /usr/local/bin/ploinky-box-entrypoint)" = 755
            test ! -e /home/podman/.config/containers/containers.conf
            test ! -e /run/ploinky/box-transport.json
            command -v bash node npm npx git podman ss nsenter fuse-overlayfs
          '

      - name: Prepare immutable host test dependencies and sibling graph
        working-directory: sources/ploinky
        env:
          PLOINKY_EXPLORER_SOURCE: ${{ github.workspace }}/sources/full-workspace/AssistOSExplorer
        run: |
          set -euo pipefail
          export PLOINKY_TEST_CONTRACT_FILE="$RUNNER_TEMP/ploinky-box-host-contract"
          printf '6\n' > "$PLOINKY_TEST_CONTRACT_FILE"
          node --input-type=module <<'NODE'
          import path from 'node:path';
          import { installPinnedDependencies } from './ploinky-box/entrypoint/install-dependencies.mjs';

          const result = installPinnedDependencies({
            targetRoot: path.resolve('node_modules'),
            contractPath: process.env.PLOINKY_TEST_CONTRACT_FILE,
          });
          if (!result.changed) throw new Error('clean checkout unexpectedly reused host test dependencies');
          NODE
          ln -s "$PLOINKY_EXPLORER_SOURCE" ../AssistOSExplorer
          test "$(realpath ../AssistOSExplorer)" = "$PLOINKY_EXPLORER_SOURCE"

      - name: Run current local-core parity through ploinky-local
        working-directory: sources/ploinky
        run: |
          set -euo pipefail
          export PLOINKY_RELAY_TEST_IMAGE="$PLOINKY_BOX_CANDIDATE_REF"
          shim_dir="$RUNNER_TEMP/ploinky-local-path"
          mkdir -p "$shim_dir"
          ln -s "$PWD/bin/ploinky-local" "$shim_dir/ploinky"
          export PATH="$shim_dir:$PWD/bin:$PATH"
          unset PLOINKY_BRANCH
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import fs from 'node:fs';
          const source = fs.readFileSync('tests/unit/seatbeltProfile.test.mjs', 'utf8');
          const names = [
            'generated profile can launch a basic macOS command',
            'generated profile denies writes to read-only code, cache, and staged lib',
          ];
          for (const name of names) {
            assert.match(source, new RegExp(`test\\('${name.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\$&')}'[\\s\\S]*?skip: process\\.platform !== 'darwin'`));
          }
          NODE
          mapfile -d '' tests < <(
            find tests/unit -maxdepth 1 -type f \
              \( -name '*.test.js' -o -name '*.test.mjs' -o -name '*.test.cjs' \) \
              ! -name 'ploinkyBox*.test.*' -print0 | sort -z
          )
          test "${#tests[@]}" -gt 0
          set +e
          node --test --test-reporter tap "${tests[@]}" | tee "$RUNNER_TEMP/local-core.tap"
          test_status=${PIPESTATUS[0]}
          set -e
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import fs from 'node:fs';
          const tap = fs.readFileSync(process.env.RUNNER_TEMP + '/local-core.tap', 'utf8');
          assert.match(tap, /^# fail 0$/m);
          assert.match(tap, /^# todo 0$/m);
          assert.match(tap, /^# skipped 2$/m);
          const skipped = [...tap.matchAll(/^ok \d+ - (.+) # SKIP$/gm)].map((match) => match[1]).sort();
          assert.deepEqual(skipped, [
            'generated profile can launch a basic macOS command',
            'generated profile denies writes to read-only code, cache, and staged lib',
          ].sort());
          NODE
          test "$test_status" -eq 0

      - name: Run native Box integration, pinned-graph smoke, and installed CLI E2E
        working-directory: sources/ploinky
        env:
          PLOINKY_BOX_REQUIRE_PODMAN: '1'
          PLOINKY_BOX_PROXY_TRACE_ARTIFACT: ${{ runner.temp }}/ploinky-box-proxy-${{ matrix.arch }}.trace
        run: |
          set -euo pipefail
          node --test --test-concurrency=1 --test-reporter tap \
            tests/integration/ploinkyBoxNative.test.mjs \
            tests/integration/ploinkyBoxSmokeGraph.test.mjs \
            tests/e2e/ploinkyBox/publicCli.test.mjs \
            | tee "$RUNNER_TEMP/ploinky-box-native.tap"
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import fs from 'node:fs';
          const tap = fs.readFileSync(process.env.RUNNER_TEMP + '/ploinky-box-native.tap', 'utf8');
          assert.match(tap, /^# fail 0$/m);
          assert.match(tap, /^# skipped 0$/m);
          assert.match(tap, /^# todo 0$/m);
          const trace = fs.readFileSync(process.env.PLOINKY_BOX_PROXY_TRACE_ARTIFACT);
          assert.ok(trace.length > 0);
          assert.equal(trace.includes(Buffer.from('docker.io/assistos/ploinky-box:runtime')), true);
          assert.equal(trace.includes(Buffer.from(process.env.PLOINKY_BOX_CANDIDATE_DIGEST)), true);
          NODE

      - name: Export gated candidate digest and proxy trace
        run: |
          set -euo pipefail
          printf '%s\n' "$PLOINKY_BOX_CANDIDATE_DIGEST" > "$RUNNER_TEMP/${{ matrix.arch }}.txt"

      - name: Upload gated candidate evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ploinky-box-gated-${{ matrix.arch }}
          path: |
            ${{ runner.temp }}/${{ matrix.arch }}.txt
            ${{ runner.temp }}/ploinky-box-proxy-${{ matrix.arch }}.trace
          if-no-files-found: error
          retention-days: 30

  merge:
    name: Promote gated multiarchitecture runtime
    needs:
      - resolve-source
      - build
    runs-on: ubuntu-24.04
    steps:
      - name: Download gated candidate evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ploinky-box-gated-*
          path: /tmp/ploinky-box-gates
          merge-multiple: true

      - name: Verify exact gated digest attestations and T28 proxy traces
        id: candidates
        run: |
          set -euo pipefail
          mapfile -t digest_files < <(find /tmp/ploinky-box-gates -maxdepth 1 -type f -name '*.txt' | sort)
          mapfile -t trace_files < <(find /tmp/ploinky-box-gates -maxdepth 1 -type f -name '*.trace' | sort)
          test "${#digest_files[@]}" -eq 2
          test "${#trace_files[@]}" -eq 2
          amd64_digest="$(cat /tmp/ploinky-box-gates/amd64.txt)"
          arm64_digest="$(cat /tmp/ploinky-box-gates/arm64.txt)"
          [[ "$amd64_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$arm64_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          test "$amd64_digest" != "$arm64_digest"
          export AMD64_DIGEST="$amd64_digest"
          export ARM64_DIGEST="$arm64_digest"
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import fs from 'node:fs';

          const logical = 'docker.io/assistos/ploinky-box:runtime';
          function records(file) {
            return fs.readFileSync(file).toString('utf8').split('\0\0')
              .filter(Boolean).map((record) => record.split('\0'));
          }
          for (const [arch, digest] of [
            ['amd64', process.env.AMD64_DIGEST],
            ['arm64', process.env.ARM64_DIGEST],
          ]) {
            const trace = records(`/tmp/ploinky-box-gates/ploinky-box-proxy-${arch}.trace`);
            assert.equal(trace.some((record) => record[0] === 'reject'), false);
            const rewrites = trace.filter((record) => record[0] === 'rewrite');
            assert.ok(rewrites.length >= 2);
            for (const rewrite of rewrites) {
              assert.deepEqual(rewrite, [
                'rewrite', logical, `docker.io/assistos/ploinky-box@${digest}`,
              ]);
            }
            const argv = trace.filter((record) => record[0] === 'argv')
              .map((record) => record.slice(1));
            const logicalCalls = argv.filter((record) => record.includes(logical));
            assert.ok(logicalCalls.length >= 2);
            for (const call of logicalCalls) {
              assert.equal(
                (call.length === 2 && call[0] === 'pull' && call[1] === logical)
                  || (call.length === 3 && call[0] === 'image'
                    && call[1] === 'inspect' && call[2] === logical),
                true,
              );
            }
            const creates = argv.filter((record) => (
              record[0] === 'container' && record[1] === 'create'
            ));
            assert.ok(creates.length >= 1);
            assert.match(creates.at(-1).at(-1), /^(?:sha256:)?[a-f0-9]{64}$/);
          }
          NODE
          echo "amd64_digest=$amd64_digest" >> "$GITHUB_OUTPUT"
          echo "arm64_digest=$arm64_digest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prove the run-scoped staging tag is unused
        run: |
          set -euo pipefail
          staging="docker.io/${IMAGE_NAME}:runtime-candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if docker buildx imagetools inspect "$staging" >/dev/null 2>&1; then
            echo "Refusing to overwrite existing staging tag: $staging" >&2
            exit 1
          fi
          echo "STAGING_REF=$staging" >> "$GITHUB_ENV"

      - name: Assemble and inspect the exact gated staging manifest
        env:
          AMD64_DIGEST: ${{ steps.candidates.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.candidates.outputs.arm64_digest }}
          SOURCE_SHA: ${{ needs.resolve-source.outputs.source_sha }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --annotation "index:io.assistos.ploinky.workflow-run=${GITHUB_RUN_ID}" \
            --annotation "index:io.assistos.ploinky.source-sha=${SOURCE_SHA}" \
            --annotation "index:io.assistos.ploinky.amd64-digest=${AMD64_DIGEST}" \
            --annotation "index:io.assistos.ploinky.arm64-digest=${ARM64_DIGEST}" \
            --tag "$STAGING_REF" \
            "docker.io/${IMAGE_NAME}@${AMD64_DIGEST}" \
            "docker.io/${IMAGE_NAME}@${ARM64_DIGEST}"
          docker buildx imagetools inspect --raw "$STAGING_REF" > "$RUNNER_TEMP/staging-index.json"
          docker buildx imagetools inspect "$STAGING_REF" > "$RUNNER_TEMP/staging-inspect.txt"
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import fs from 'node:fs';
          const index = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/staging-index.json'));
          assert.equal(index.manifests.length, 2);
          const members = new Map(index.manifests.map((entry) => [
            `${entry.platform.os}/${entry.platform.architecture}`,
            entry.digest,
          ]));
          assert.deepEqual([...members.keys()].sort(), ['linux/amd64', 'linux/arm64']);
          assert.equal(members.get('linux/amd64'), process.env.AMD64_DIGEST);
          assert.equal(members.get('linux/arm64'), process.env.ARM64_DIGEST);
          NODE
          staging_digest="$(sed -n 's/^Digest: //p' "$RUNNER_TEMP/staging-inspect.txt" | head -1)"
          [[ "$staging_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "STAGING_DIGEST=$staging_digest" >> "$GITHUB_ENV"

      - name: Move runtime by the exact inspected staging digest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "docker.io/${IMAGE_NAME}:${IMAGE_TAG}" \
            "docker.io/${IMAGE_NAME}@${STAGING_DIGEST}"

      - name: Read-only post-promotion digest confirmation
        run: |
          set -euo pipefail
          staging_digest="$(docker buildx imagetools inspect "$STAGING_REF" | sed -n 's/^Digest: //p' | head -1)"
          runtime_digest="$(docker buildx imagetools inspect "docker.io/${IMAGE_NAME}:${IMAGE_TAG}" | sed -n 's/^Digest: //p' | head -1)"
          test "$staging_digest" = "$STAGING_DIGEST"
          test "$runtime_digest" = "$STAGING_DIGEST"
          docker buildx imagetools inspect --raw "docker.io/${IMAGE_NAME}@${runtime_digest}" > /dev/null
