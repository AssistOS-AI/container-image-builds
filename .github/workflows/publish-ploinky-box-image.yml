name: Publish ploinky-box image

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'AssistOS-AI/ploinky ref to build from'
        required: false
        default: 'master'
        type: string
      image_tag:
        description: 'Docker Hub tag to publish'
        required: false
        default: 'podman-node24'
        type: string

permissions:
  contents: read

concurrency:
  group: publish-ploinky-box-image
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/ploinky-box
  IMAGE_TAG: ${{ inputs.image_tag || 'podman-node24' }}

jobs:
  publish:
    name: Build and push Docker Hub image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout ploinky source
        uses: actions/checkout@v4
        with:
          repository: AssistOS-AI/ploinky
          ref: ${{ inputs.source_ref || 'master' }}
          path: sources/ploinky
          submodules: true
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Resolve build revision
        id: build_rev
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build verification image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/ploinky-box/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ploinky-box:verify

      - name: Verify image contents (runtime-only, no baked ploinky)
        run: |
          docker run --rm --user podman --entrypoint bash \
            ploinky-box:verify -lc '
              set -e
              node -v
              npm -v
              npx -v
              git --version
              podman --version
              command -v slirp4netns
              test -f /etc/ploinky-box
              test -d /opt/ploinky
              test -z "$(ls -A /opt/ploinky)"
              test -x /usr/local/bin/ploinky-box-entrypoint
              echo IMAGE-OK
            '

      - name: Verify ploinky-box entrypoint self-check
        run: |
          entrypoint_deps_volume="ploinky-box-entrypoint-deps-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          entrypoint_container="ploinky-box-entrypoint-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker rm -f "$entrypoint_container" >/dev/null 2>&1 || true
          docker volume rm -f "$entrypoint_deps_volume" >/dev/null 2>&1 || true
          docker volume create "$entrypoint_deps_volume"
          trap 'docker rm -f "$entrypoint_container" >/dev/null 2>&1 || true; docker volume rm -f "$entrypoint_deps_volume" >/dev/null 2>&1 || true' EXIT
          docker run --rm --user root --entrypoint bash \
            -v "$PWD/sources/ploinky:/opt/ploinky:ro" \
            -v "$entrypoint_deps_volume":/opt/ploinky/node_modules \
            ploinky-box:verify -lc 'chown podman:podman /opt/ploinky/node_modules'
          docker run -d --name "$entrypoint_container" --user podman \
            --device /dev/fuse --device /dev/net/tun --security-opt seccomp=unconfined \
            -v "$PWD/sources/ploinky:/opt/ploinky:ro" \
            -v "$entrypoint_deps_volume":/opt/ploinky/node_modules \
            ploinky-box:verify
          for _ in $(seq 1 30); do
            docker logs "$entrypoint_container" 2>&1 | grep -q 'self-check OK' && break
            sleep 1
          done
          docker logs "$entrypoint_container" | grep -q 'self-check OK'

      - name: Verify mounted-source contract
        run: |
          verify_deps_volume="ploinky-box-verify-deps-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker volume rm -f "$verify_deps_volume" >/dev/null 2>&1 || true
          docker volume create "$verify_deps_volume"
          trap 'docker volume rm -f "$verify_deps_volume" >/dev/null 2>&1 || true' EXIT
          # docker named volumes start root-owned; mirror the wrapper's fixup
          docker run --rm --user root --entrypoint bash \
            -v "$PWD/sources/ploinky:/opt/ploinky:ro" \
            -v "$verify_deps_volume":/opt/ploinky/node_modules \
            ploinky-box:verify -lc 'chown podman:podman /opt/ploinky/node_modules'
          # 1) first ploinky run without deps: non-interactive => decline, warn, exit non-zero
          set +e
          out=$(docker run --rm --user podman --entrypoint bash \
            -v "$PWD/sources/ploinky:/opt/ploinky:ro" \
            -v "$verify_deps_volume":/opt/ploinky/node_modules \
            ploinky-box:verify -lc 'ploinky help' 2>&1)
          code=$?
          set -e
          echo "$out"
          test "$code" -ne 0
          echo "$out" | grep -q "Ploinky cannot run until dependencies are installed"
          # 2) explicit install writes only into the deps volume
          docker run --rm --user podman --entrypoint bash \
            -v "$PWD/sources/ploinky:/opt/ploinky:ro" \
            -v "$verify_deps_volume":/opt/ploinky/node_modules \
            ploinky-box:verify -lc '/opt/ploinky/bin/ploinky-install-deps'
          # 3) deps landed; ploinky now runs from the mounted source via PATH
          docker run --rm --user podman --entrypoint bash \
            -v "$PWD/sources/ploinky:/opt/ploinky:ro" \
            -v "$verify_deps_volume":/opt/ploinky/node_modules \
            ploinky-box:verify -lc '
              set -e
              test -d /opt/ploinky/node_modules/achillesAgentLib
              test -d /opt/ploinky/node_modules/mcp-sdk
              ploinky help >/dev/null
              echo MOUNT-OK
            '

      - name: Nested podman check (best effort)
        continue-on-error: true
        run: |
          docker run --rm --user podman \
            --device /dev/fuse --device /dev/net/tun --security-opt seccomp=unconfined \
            --security-opt label=disable \
            -v "$PWD/sources/ploinky:/opt/ploinky:ro" \
            -v /opt/ploinky/node_modules \
            ploinky-box:verify \
            podman run --network slirp4netns:allow_host_loopback=true \
              --rm docker.io/library/alpine echo nested-ok

      - name: WebTTY runtime check (best effort)
        continue-on-error: true
        run: |
          docker run --rm --user podman \
            --device /dev/fuse --device /dev/net/tun --security-opt seccomp=unconfined \
            --security-opt label=disable \
            -v "$PWD/sources/ploinky:/opt/ploinky:ro" \
            -v /opt/ploinky/node_modules \
            ploinky-box:verify \
            podman run --rm docker.io/assistos/webtty-agent:node24 \
              node -e "require('node-pty'); console.log('webtty-runtime-ok')"

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=${{ env.IMAGE_TAG }}-${{ steps.build_rev.outputs.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/ploinky-box/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
