name: Publish ploinky-box image

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'AssistOS-AI/ploinky ref to build from'
        required: false
        default: 'master'
        type: string
      image_tag:
        description: 'Docker Hub tag to publish'
        required: false
        default: 'podman-node24'
        type: string

permissions:
  contents: read

concurrency:
  group: publish-ploinky-box-image
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/ploinky-box
  IMAGE_TAG: ${{ inputs.image_tag || 'podman-node24' }}

jobs:
  publish:
    name: Build and push Docker Hub image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout ploinky source
        uses: actions/checkout@v4
        with:
          repository: AssistOS-AI/ploinky
          ref: ${{ inputs.source_ref || 'master' }}
          path: sources/ploinky
          submodules: true
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Resolve source revision
        id: source
        run: echo "sha=$(git -C sources/ploinky rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build verification image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/ploinky-box/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ploinky-box:verify

      - name: Verify image contents
        run: |
          docker run --rm --user podman --entrypoint bash \
            --device /dev/fuse --security-opt seccomp=unconfined \
            ploinky-box:verify -lc '
              set -e
              node -v
              git --version
              podman --version
              test -x /opt/ploinky/bin/ploinky
              test -x /opt/ploinky/bin/p-cli
              test -d /opt/ploinky/node_modules/achillesAgentLib
              test -d /opt/ploinky/node_modules/mcp-sdk
              echo IMAGE-OK
            '

      - name: Nested podman check (best effort)
        continue-on-error: true
        run: |
          docker run --rm --user podman \
            --device /dev/fuse --security-opt seccomp=unconfined \
            ploinky-box:verify \
            podman run --rm docker.io/library/alpine echo nested-ok

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=${{ env.IMAGE_TAG }}-${{ steps.source.outputs.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/ploinky-box/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
