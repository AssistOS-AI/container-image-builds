name: Publish Ploinky Node Image

on:
  workflow_dispatch:
    inputs:
      node_base:
        description: 'Node base image to build from'
        required: false
        default: 'node:24-bookworm-slim'
        type: string
      image_tag:
        description: 'Docker Hub tag to publish'
        required: false
        default: '24-bookworm-tools'
        type: string
  push:
    branches:
      - main
    paths:
      - 'images/ploinky-node/**'
      - '.github/workflows/publish-ploinky-node-image.yml'

concurrency:
  group: publish-ploinky-node-image
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/ploinky-node
  DEFAULT_NODE_BASE: node:24-bookworm-slim
  DEFAULT_IMAGE_TAG: 24-bookworm-tools

jobs:
  publish:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image inputs
        id: image
        run: |
          set -euo pipefail
          node_base="${{ github.event.inputs.node_base }}"
          image_tag="${{ github.event.inputs.image_tag }}"
          if [ -z "$node_base" ]; then
            node_base="$DEFAULT_NODE_BASE"
          fi
          if [ -z "$image_tag" ]; then
            image_tag="$DEFAULT_IMAGE_TAG"
          fi
          echo "node_base=$node_base" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Smoke build local architecture
        run: |
          set -euo pipefail
          docker build \
            --build-arg NODE_BASE='${{ steps.image.outputs.node_base }}' \
            -t "$IMAGE_NAME:smoke" \
            images/ploinky-node
          docker run --rm "$IMAGE_NAME:smoke" sh -lc 'node --version && npm --version && git --version && python3 --version && make --version && g++ --version && ffmpeg -version | head -1'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: images/ploinky-node
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NODE_BASE=${{ steps.image.outputs.node_base }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:${{ env.DEFAULT_IMAGE_TAG }}
