name: Publish Ploinky network gateway image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Hub tag to publish'
        required: false
        default: '1'
        type: string

permissions:
  contents: read

concurrency:
  group: publish-ploinky-network-gateway
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/ploinky-network-gateway
  DEFAULT_IMAGE_TAG: '1'

jobs:
  publish:
    name: Build, gate, and publish multiarchitecture image
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.image.outputs.image_tag }}
    steps:
      - name: Checkout image definitions
        uses: actions/checkout@v4

      - name: Resolve and validate image tag
        id: image
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          image_tag="${INPUT_IMAGE_TAG:-$DEFAULT_IMAGE_TAG}"
          tag_pattern='^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'
          if [[ "$image_tag" == *$'\n'* || "$image_tag" == *$'\r'* || ! "$image_tag" =~ $tag_pattern ]]; then
            echo "Invalid image_tag input." >&2
            exit 1
          fi
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Smoke build fixed local proxy contract
        run: |
          set -euo pipefail
          image="$IMAGE_NAME:smoke"
          socket_dir="$RUNNER_TEMP/ploinky-network-gateway"
          socket_path="$socket_dir/router.sock"
          container=ploinky-network-gateway-smoke
          cleanup() {
            docker rm -f "$container" >/dev/null 2>&1 || true
            test -n "${server_pid:-}" && kill "$server_pid" >/dev/null 2>&1 || true
            rm -rf "$socket_dir"
          }
          trap cleanup EXIT
          mkdir -p "$socket_dir"
          docker build -t "$image" images/ploinky-network-gateway
          test "$(docker image inspect --format '{{.Config.User}}' "$image")" = '65532:65532'
          test "$(docker image inspect --format '{{json .Config.Entrypoint}}' "$image")" = '["/ploinky-network-gateway"]'
          test "$(docker image inspect --format '{{json .Config.Cmd}}' "$image")" = 'null'
          python3 - "$socket_path" <<'PY' &
          import os
          import socket
          import sys

          path = sys.argv[1]
          server = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
          server.bind(path)
          os.chmod(path, 0o666)
          server.listen(1)
          connection, _ = server.accept()
          with connection:
              if connection.recv(64) != b"gateway-smoke":
                  raise SystemExit("unexpected gateway payload")
              connection.sendall(b"gateway-ok")
          PY
          server_pid=$!
          for _ in $(seq 1 50); do
            test -S "$socket_path" && break
            sleep 0.1
          done
          test -S "$socket_path"
          docker run -d --name "$container" \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=1m \
            --sysctl net.ipv4.ip_forward=0 \
            --mount "type=bind,src=$socket_path,dst=/run/ploinky/router.sock,readonly" \
            -p 127.0.0.1:18080:8080 \
            "$image" >/dev/null
          test "$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' "$container")" = true
          test "$(docker inspect --format '{{json .HostConfig.CapDrop}}' "$container")" = '["ALL"]'
          test "$(docker inspect --format '{{index .HostConfig.Sysctls "net.ipv4.ip_forward"}}' "$container")" = 0
          test "$(docker inspect --format '{{len .Mounts}}' "$container")" = 1
          test "$(docker inspect --format '{{(index .Mounts 0).Destination}}' "$container")" = /run/ploinky/router.sock
          python3 - <<'PY'
          import socket

          with socket.create_connection(("127.0.0.1", 18080), timeout=10) as connection:
              connection.sendall(b"gateway-smoke")
              if connection.recv(64) != b"gateway-ok":
                  raise SystemExit("gateway proxy response mismatch")
          PY
          wait "$server_pid"
          ! docker image inspect "$image" | grep -Eiq 'workspace|docker\.sock|podman\.sock'
          if docker run --rm "$image" configurable-target; then
            echo 'gateway unexpectedly accepted a configurable destination' >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish multiarchitecture image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: images/ploinky-network-gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: docker.io/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.image_tag }}
          provenance: false

      - name: Report immutable manifest digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_TAG: ${{ steps.image.outputs.image_tag }}
        run: |
          set -euo pipefail
          [[ "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "Published docker.io/${IMAGE_NAME}:${IMAGE_TAG}@${DIGEST}"
          {
            echo '### Ploinky network gateway publication'
            echo
            echo "- Manifest: \`docker.io/${IMAGE_NAME}:${IMAGE_TAG}@${DIGEST}\`"
            echo '- Platforms: `linux/amd64`, `linux/arm64`'
          } >> "$GITHUB_STEP_SUMMARY"
