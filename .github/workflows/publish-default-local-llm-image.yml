name: Publish default-local-llm image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: false
        default: cpu-qwen25-coder-1.5b
        type: string
      base_image:
        description: Base image
        required: false
        default: docker.io/assistos/ploinky-node:24-bookworm-tools
        type: string
      model_repo:
        description: HuggingFace GGUF repo
        required: false
        default: bartowski/Qwen2.5-Coder-1.5B-Instruct-GGUF
        type: string
      model_file:
        description: GGUF filename
        required: false
        default: Qwen2.5-Coder-1.5B-Instruct-Q4_K_M.gguf
        type: string

env:
  IMAGE_NAME: assistos/default-local-llm

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: images/default-local-llm
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}
            MODEL_REPO=${{ inputs.model_repo }}
            MODEL_FILE=${{ inputs.model_file }}
          outputs: type=image,name=docker.io/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Smoke pushed digest
        run: |
          docker run --rm "docker.io/${IMAGE_NAME}@${{ steps.build.outputs.digest }}" sh -lc 'node --version && llama-server --version && test -f "$LLAMA_MODEL_PATH"'

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifest
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          docker buildx imagetools create \
            -t "docker.io/${IMAGE_NAME}:${IMAGE_TAG}" \
            -t "docker.io/${IMAGE_NAME}:${IMAGE_TAG}-${GITHUB_SHA}" \
            $(printf "docker.io/${IMAGE_NAME}@sha256:%s " *)

      - name: Inspect manifest
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          docker buildx imagetools inspect "docker.io/${IMAGE_NAME}:${IMAGE_TAG}" | tee /tmp/default-local-llm-manifest.txt
          grep -q 'linux/amd64' /tmp/default-local-llm-manifest.txt
          grep -q 'linux/arm64' /tmp/default-local-llm-manifest.txt
