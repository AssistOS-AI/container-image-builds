<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ploinky Web TTY</title>
  <link rel="stylesheet" href="/explorer/shared/ui/ui-common.css" />
  <link rel="stylesheet" href="assets/vendor/xterm/xterm.css" />
  <link rel="stylesheet" href="assets/webtty.css" />
  <script src="assets/vendor/xterm/xterm.js"></script>
  <script src="assets/vendor/xterm/xterm-addon-fit.js"></script>
  <script src="assets/vendor/xterm/xterm-addon-web-links.js"></script>
</head>
<body data-page="webtty" data-theme="light" data-agent="__AGENT_NAME__" data-container="__CONTAINER_NAME__" data-runtime="__RUNTIME__" data-auth="__REQUIRES_AUTH__" data-base="__BASE_PATH__">
  <div class="wa-header">
    <div class="wa-header-avatar">
      <span>⚡</span>
    </div>
    <div class="wa-header-info">
      <div class="wa-header-title" id="titleBar">WebTTY</div>
      <div class="wa-header-status">
        <span class="wa-status-dot offline"></span>
        <span id="status">disconnected</span>
      </div>
    </div>
    <div class="wa-header-actions">
      <button class="wa-icon-btn" id="themeToggle" title="Toggle theme">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 18c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6zm0-10c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4z"/>
          <path d="M13 4h-2v-2h2v2zm0 18h-2v-2h2v2zm9-11h-2v-2h2v2zm-18 0h-2v-2h2v2z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="wa-connection-banner" id="connBanner">
    <span id="bannerText">Connecting…</span>
  </div>

  <div class="wa-terminal-container">
    <div class="wa-terminal-info">
      <div class="wa-terminal-info-item">
        <span class="wa-terminal-info-label">Container:</span>
        <span id="containerName">-</span>
      </div>
      <div class="wa-terminal-info-item">
        <span class="wa-terminal-info-label">Runtime:</span>
        <span id="runtime">-</span>
      </div>
      <div class="wa-terminal-info-item">
        <span class="wa-terminal-info-label">Size:</span>
        <span id="size">-</span>
      </div>
      <div class="wa-terminal-focus-hint">
        Click terminal to focus
      </div>
    </div>
    
    <div id="term"></div>

    <div class="wa-terminal-footer">
      <span>&nbsp;</span>
    </div>
  </div>

  <script src="assets/webtty.js"></script>
</body>
</html>
